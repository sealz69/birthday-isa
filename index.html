<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Gëzuar ditëlindjen ISAA! ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}

body{
min-height:100vh;
background:radial-gradient(circle at top,#1a0a00,#000);
font-family:system-ui,-apple-system,Segoe UI,sans-serif;
color:#fff;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
touch-action:manipulation;
}

h1{
font-size:clamp(2.8rem,8vw,5rem);
color:#ff69b4;
text-shadow:0 0 20px #ff1493;
animation:glow 3s ease-in-out infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #ff1493,0 0 20px #db7093;}
to{text-shadow:0 0 30px #ff69b4,0 0 60px #c71585,0 0 90px #db7093;}
}

#login-screen{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:100;
}

#password-input{
padding:1rem 1.5rem;
font-size:1.5rem;
border:3px solid #ff1493;
border-radius:12px;
background:#111;
color:white;
width:90%;
max-width:380px;
text-align:center;
margin:1.5rem 0 1rem;
}

#submit-btn{
padding:1rem 2.5rem;
font-size:1.4rem;
border:none;
border-radius:50px;
background:linear-gradient(135deg,#db7093,#ff69b4);
color:white;
cursor:pointer;
}

#main-content{
display:none;
opacity:0;
transition:opacity 1.2s ease;
z-index:10;
position:relative;
}

#main-content.visible{opacity:1;}

#cake,#gift{
font-size:clamp(5rem,18vw,9rem);
margin:1.5rem 0;
cursor:pointer;
user-select:none;
transition:transform .3s;
touch-action:manipulation;
}

#cake:active,#gift:active{
transform:scale(1.15);
}

#gift{
opacity:.5;
pointer-events:none;
}

#gift.active{
opacity:1;
pointer-events:auto;
}

#surprise{
font-size:clamp(1.6rem,5vw,2.4rem);
color:#ffb6c1;
margin:2rem 1rem;
min-height:3rem;
}

#progress-container{
display:none;
position:fixed;
bottom:15%;
left:50%;
transform:translateX(-50%);
width:250px;
height:25px;
background:rgba(0,0,0,0.5);
border-radius:20px;
overflow:hidden;
}

#progress-bar{
height:100%;
width:0%;
background:linear-gradient(to right,#ff69b4,#ff1493);
}
</style>
</head>

<body>

<audio id="birthday-song" loop preload="auto">
<source src="song.mp3" type="audio/mpeg">
</audio>

<div id="login-screen">
<h2>MIRË SE ERDHE ISA!!</h2>
<input id="password-input" placeholder="Shkruaj password këtu..." autocomplete="off"/>
<button id="submit-btn">Hap Surprizën</button>
</div>

<div id="main-content">
<h1>HAPPY BIRTHDAY ISAA!!!</h1>
<div id="cake">🎂🕯🕯🕯🕯</div>

<div style="position:relative;display:inline-block;margin-top:1rem;">
<div id="gift">✉️</div>
<div id="klik-text">Klikoje</div>
</div>

<div id="surprise"></div>
</div>

<div id="progress-container">
<div id="progress-bar"></div>
</div>

<script>

const VALID_PASSWORDS=["david","davidi"];

const audio=document.getElementById("birthday-song");
const loginScreen=document.getElementById("login-screen");
const mainContent=document.getElementById("main-content");
const gift=document.getElementById("gift");
const cake=document.getElementById("cake");
const progressBar=document.getElementById("progress-bar");
const progressContainer=document.getElementById("progress-container");
const klikText=document.getElementById("klik-text");

const messages=[
"JE KUSHËRIRA MË E MIRË NË BOTË DHE DUA TË TË THEM SA SHUMË DO TË THOTË PËR MUA. TË DUA SHUMË DHE JAM SHUMË ME FAT QË TË KAM NË JETËN TIME. TI JE GJITHMONË E DASHUR, E MIRË DHE PLOT ZEMËR, DHE ÇDO MOMENT ME TY ËSHTË I VEÇANTË. SHPRESOJ QË DITA JOTE TË JETË E MBUSHUR ME GËZIM, BUZËQESHJE DHE SHUMË MOMENTE TË BUKURA. MOS HARRO KURRË SA E VEÇANTË JE DHE SA SHUMË TË VLERËSOJ. TË UROJ NJË DITË TË MREKULLUESHME DHE PLOT DASHURI. ❤️"
];

function checkPassword(){

const input=document.getElementById("password-input").value.trim().toLowerCase();

if(VALID_PASSWORDS.includes(input)){

loginScreen.style.display="none";
mainContent.style.display="block";
setTimeout(()=>mainContent.classList.add("visible"),100);

audio.volume=0;
audio.play().catch(()=>{});

let fade=setInterval(()=>{
if(audio.volume<0.45)audio.volume+=0.02;
else clearInterval(fade);
},150);

}

}

document.getElementById("submit-btn").addEventListener("pointerdown",checkPassword);

document.getElementById("password-input").addEventListener("keypress",e=>{
if(e.key==="Enter")checkPassword();
});

let candlesLit=true;
let progress=0;
let rafId;

function animateProgress(){

progress+=1;
progressBar.style.width=progress+"%";

if(progress>=100){
blowOutCandles();
return;
}

rafId=requestAnimationFrame(animateProgress);

}

function startBlow(e){

if(!candlesLit)return;

progress=0;
progressBar.style.width="0%";
progressContainer.style.display="block";

cancelAnimationFrame(rafId);
rafId=requestAnimationFrame(animateProgress);

}

function stopBlow(){

cancelAnimationFrame(rafId);
progressBar.style.width="0%";
progressContainer.style.display="none";

}

cake.addEventListener("pointerdown",startBlow);
document.addEventListener("pointerup",stopBlow);
document.addEventListener("pointercancel",stopBlow);

function blowOutCandles(){

cake.innerHTML="";
progressContainer.style.display="none";
candlesLit=false;

alert("Bëj një dëshirë ISAA! 🎂");

gift.classList.add("active");

}

function typeMessage(){

const text=messages[0];
const container=document.getElementById("surprise");

container.innerHTML="";
let i=0;

let typing=setInterval(()=>{

container.innerHTML+=text[i];
i++;

if(i>=text.length)clearInterval(typing);

},70);

}

gift.addEventListener("pointerdown",()=>{

if(gift.classList.contains("active")){

gift.innerHTML="";
klikText.style.display="none";
typeMessage();

}

});

</script>

</body>
</html>
